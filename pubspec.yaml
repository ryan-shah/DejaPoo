name: dejapoo
description: "Bristol Stool Chart bowel movement tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.1
  go_router: ^14.8.1
  flutter_svg: ^2.0.17
  drift: 2.34.0
  drift_flutter: ^0.3.1
  uuid: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.1
  drift_dev: 2.34.0
  # Direct dep because test/web/ imports package:sqlite3/wasm.dart;
  # version must stay compatible with the pinned drift 2.34.0.
  sqlite3: ^3.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    # Bundled so the browser smoke test (test/web/) can load WASM sqlite via
    # rootBundle; also served from web/ in web builds. ~730KB in app bundles —
    # revisit if mobile size ever matters.
    - web/sqlite3.wasm
