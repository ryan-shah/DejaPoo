name: dejapoo
description: "Bristol Stool Chart bowel movement tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.1
  go_router: ^14.8.1
  flutter_svg: ^2.0.17
  drift: 2.34.0
  drift_flutter: ^0.3.1
  uuid: ^4.6.0
  fl_chart: ^0.70.2
  excel: ^4.0.6
  csv: ^8.0.0
  file_picker: ^11.0.2
  url_launcher: ^6.3.2
  google_sign_in: ^7.0.1
  google_sign_in_web: ^1.1.3
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  googleapis: ^14.0.0
  googleapis_auth: ^2.3.3
  share_plus: ^10.1.4
  http: ^1.2.0
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  shared_preferences: ^2.3.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.1
  drift_dev: 2.34.0
  sqlite3: ^3.4.0
  path: ^1.9.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4
  image: ^4.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#6FAE8D"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#FAFAF7"
  image: "assets/icon/app_icon.png"
  android_12:
    color: "#FAFAF7"
    icon_background_color: "#6FAE8D"
    image: "assets/icon/app_icon.png"
