name: Android Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          LATEST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            VERSION_NAME=${LATEST_TAG#v}
            DISTANCE=$(git rev-list --count "${LATEST_TAG}..HEAD")
            if [ "$DISTANCE" -gt 0 ]; then
              VERSION_NAME="${VERSION_NAME}+${DISTANCE}"
            fi
          else
            VERSION_NAME="0.1.0"
          fi
          echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION_NAME} (code ${VERSION_CODE})"

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Set up release signing
        if: github.event_name == 'push' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=keystore.jks\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
            > android/key.properties

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Build AAB
        if: github.event_name == 'push'
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Upload PR artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dejapoo-pr-${{ github.event.number }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.version.outputs.code }}
          name: v${{ steps.version.outputs.name }} (build ${{ steps.version.outputs.code }})
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
