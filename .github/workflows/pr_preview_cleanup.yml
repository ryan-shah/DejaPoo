name: PR Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove PR subfolder from gh-pages
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages

          PR_DIR="/tmp/gh-pages/pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            rm -rf "$PR_DIR"
            cd /tmp/gh-pages
            git add -A
            git commit -m "Remove PR #${{ github.event.pull_request.number }} preview"
            git push origin HEAD:gh-pages
          else
            echo "No preview folder found, nothing to clean up."
          fi
