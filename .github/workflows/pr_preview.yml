name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs

      - run: dart run tool/setup_web.dart

      - run: flutter build web --release --base-href /DejaPoo/pr-${{ github.event.pull_request.number }}/ --dart-define=DEMO_MODE=true --dart-define=DB_NAME=dejapoo_pr${{ github.event.pull_request.number }}

      - name: Deploy to gh-pages subfolder
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          # Fetch and switch to gh-pages, preserving existing content
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages

          # Replace this PR's subfolder
          PR_DIR="/tmp/gh-pages/pr-${{ github.event.pull_request.number }}"
          rm -rf "$PR_DIR"
          cp -r build/web "$PR_DIR"

          cd /tmp/gh-pages
          git add -A
          git commit -m "Deploy PR #${{ github.event.pull_request.number }} preview" || echo "Nothing to commit"
          git push origin HEAD:gh-pages

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = `https://${{ github.repository_owner }}.github.io/DejaPoo/pr-${pr}/`;
            const body = `## Preview build\n\n:rocket: **[${url}](${url})**\n\nUpdated with the latest push to this PR.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith('## Preview build')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
