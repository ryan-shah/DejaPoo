<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Google Sign-In web client ID (replace with your actual client ID) -->
  <meta name="google-signin-client_id" content="460206928839-cvl27ghr2k5nvtml6e5mc82i2v6o3b1l.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="dejapoo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>dejapoo</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Register COI service worker for OPFS support on GitHub Pages
    // (GitHub Pages cannot send COOP/COEP headers, so drift's sqlite3 WASM would
    // otherwise fall back to IndexedDB forever). This MUST run and reload the
    // page BEFORE the app boots: if the app boots pre-reload, drift creates its
    // database in IndexedDB and keeps using it even after OPFS becomes available.
    if ('serviceWorker' in navigator) {
      if (!navigator.serviceWorker.controller) {
        navigator.serviceWorker.register('coi_serviceworker.js').then(function () {
          window.location.reload();
        });
        // Prevent flutter_bootstrap.js below from running before the reload.
        throw new Error('Reloading for COI service worker');
      }
    }
  </script>
  <script src="https://apis.google.com/js/api.js" onload="gapi.load('picker')"></script>
  <script>
    function _createAndShowDrivePicker(accessToken, callback) {
      var docsView = new google.picker.DocsView()
        .setIncludeFolders(true)
        .setMimeTypes('application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv');
      var picker = new google.picker.PickerBuilder()
        .addView(docsView)
        .setOAuthToken(accessToken)
        .setCallback(callback)
        .setTitle('Select a spreadsheet to import')
        .build();
      picker.setVisible(true);
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
